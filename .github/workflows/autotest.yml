on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        lisp:
          - sbcl-bin
          - abcl-bin
          - ccl-bin
          - clasp-bin
          - clisp-head
          - cmu-bin
          - ecl
    env:
      LISP: ${{ matrix.lisp }}

    steps:
      - uses: actions/checkout@v1
      - uses: 40ants/setup-lisp@v4
        with:
          asdf-system: cl-nbt/tests
      - uses: 40ants/run-tests@v2
        with:
          asdf-system: cl-nbt